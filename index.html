<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣棒球大富翁 - 競技版</title>
    <style>
        :root {
            --primary-bg: #051937;
            --p1-color: #ffe600; /* 黃 */
            --p2-color: #ff8c00; /* 橘 */
            --p3-color: #2ecc71; /* 綠 */
            --p4-color: #3498db; /* 藍 */
            --gold: #f1c40f;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--primary-bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 狀態欄 */
        #scoreboard {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: rgba(0,0,0,0.9);
            padding: 15px 0;
            border-bottom: 4px solid var(--gold);
            min-height: 60px;
        }

        .player-info {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ccc;
        }
        .active-player { color: white; border-bottom: 3px solid var(--gold); }

        /* 地圖設計：文字改為黑色 */
        #game-board {
            position: relative;
            width: 95vw;
            max-width: 650px;
            height: 95vw;
            max-height: 650px;
            margin: 20px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 6px;
        }

        .tile {
            background: white; /* 白底 */
            color: black; /* 黑字 */
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
            border: 2px solid #333;
            text-align: center;
            padding: 2px;
        }

        ruby { ruby-align: center; }
        rt { color: #555; font-size: 0.75rem; font-weight: bold; }

        /* 中央區域 */
        #center-area {
            grid-column: 2 / 5;
            grid-row: 2 / 5;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .p-marker {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            position: absolute;
            z-index: 100;
            transition: all 0.4s ease;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            display: none; /* 初始隱藏，根據人數開啟 */
        }

        /* 初始選擇介面 */
        #setup-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-bg);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .setup-btn {
            background: var(--gold);
            color: black;
            font-size: 1.5rem;
            padding: 15px 40px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* 彈窗 */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; max-width: 500px;
            background: white; color: #222;
            padding: 25px; border-radius: 15px; z-index: 2005;
        }

        .overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); z-index: 2000;
        }

        #roll-btn {
            background: var(--gold);
            font-size: 1.8rem;
            padding: 15px 50px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .opt-btn {
            display: block; width: 100%; margin: 10px 0;
            padding: 12px; font-size: 1.1rem;
            background: #eee; border-radius: 8px; border: 1px solid #ccc;
            cursor: pointer; font-weight: bold; text-align: left;
        }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1><ruby>棒球大富翁<rt>Bàngqiú Dàfùwēng</rt></ruby></h1>
    <p>請選擇玩家人數：</p>
    <div>
        <button class="setup-btn" onclick="startGame(1)">1人</button>
        <button class="setup-btn" onclick="startGame(2)">2人</button>
        <button class="setup-btn" onclick="startGame(3)">3人</button>
        <button class="setup-btn" onclick="startGame(4)">4人</button>
    </div>
</div>

<div id="scoreboard"></div>

<div id="game-board">
    <div id="center-area">
        <div id="dice-result" style="font-size: 2rem; color: var(--gold); font-weight: bold;"></div>
    </div>
</div>

<button id="roll-btn" onclick="movePlayer()" disabled>請投球</button>

<div class="overlay" id="overlay"></div>
<div class="modal" id="modal">
    <h2 id="m-title"></h2>
    <div id="m-content" style="font-size: 1.2rem; margin: 15px 0;"></div>
    <div id="m-quiz"></div>
    <button id="m-close" style="display:none; width:100%; padding:10px; margin-top:10px;" onclick="closeModal()">關閉</button>
</div>

<script>
    const TILES = [
        { name: "起點", pinyin: "Qǐdiǎn", type: "start" },
        { name: "天母球場", pinyin: "Tiānmǔ", type: "stadium", team: "味全龍", q: "「<ruby>全壘打<rt>Quánlěidǎ</rt></ruby>」是指球擊出牆外嗎？", opt: ["是的", "不是"], ans: 0 },
        { name: "機會", pinyin: "Jīhuì", type: "chance" },
        { name: "新莊球場", pinyin: "Xīnzhuāng", type: "stadium", team: "富邦悍將", q: "當球員不小心掉球，稱為「<ruby>失誤<rt>Shīwù</rt></ruby>」嗎？", opt: ["是的", "不是"], ans: 0 },
        { name: "自由球員", pinyin: "Zìyóu", type: "event" },
        { name: "桃園球場", pinyin: "Táoyuán", type: "stadium", team: "樂天桃猿", q: "應援團帶動氣氛叫做「<ruby>應援<rt>Yìngyuán</rt></ruby>」？", opt: ["是的", "不是"], ans: 0 },
        { name: "命運", pinyin: "Mìngyùn", type: "fate" },
        { name: "洲際球場", pinyin: "Zhōujì", type: "stadium", team: "中信兄弟", q: "「<ruby>團結<rt>Tuánjié</rt></ruby>」的意思是一起努力？", opt: ["是的", "不是"], ans: 0 },
        { name: "選秀會", pinyin: "Xuǎnxiù", type: "event" },
        { name: "台南球場", pinyin: "Táinán", type: "stadium", team: "統一獅", q: "球隊主將通常被稱為「<ruby>王牌<rt>Wángpái</rt></ruby>」？", opt: ["是的", "不是"], ans: 0 },
        { name: "機會", pinyin: "Jīhuì", type: "chance" },
        { name: "澄清湖", pinyin: "Chéngqīng", type: "stadium", team: "台鋼雄鷹", q: "棒球比賽中，一局有幾個出局數？", opt: ["兩個", "三個"], ans: 1 },
        { name: "命運", pinyin: "Mìngyùn", type: "fate" },
        { name: "轉播金", pinyin: "Zhuǎnbō", type: "event" },
        { name: "自由球員", pinyin: "Zìyóu", type: "event" },
        { name: "選秀會", pinyin: "Xuǎnxiù", type: "event" }
    ];

    let players = [];
    let numPlayers = 0;
    let turn = 0;
    let isMoving = false;

    // 初始化地圖
    function initMap() {
        const board = document.getElementById('game-board');
        TILES.forEach((t, i) => {
            const el = document.createElement('div');
            el.className = 'tile';
            el.id = `tile-${i}`;
            el.innerHTML = `<ruby>${t.name}<rt>${t.pinyin}</rt></ruby>`;
            let r, c;
            if(i<5) { r=1; c=i+1; }
            else if(i<8) { r=i-3; c=5; }
            else if(i<12) { r=5; c=13-i; }
            else { r=17-i; c=1; }
            el.style.gridRow = r; el.style.gridColumn = c;
            board.appendChild(el);
        });
    }

    function startGame(count) {
        numPlayers = count;
        const colors = ['var(--p1-color)', 'var(--p2-color)', 'var(--p3-color)', 'var(--p4-color)'];
        for(let i=0; i<count; i++) {
            players.push({ id: i+1, pos: 0, money: 1000, color: colors[i] });
            const m = document.createElement('div');
            m.className = 'p-marker';
            m.id = `p-mark-${i}`;
            m.style.backgroundColor = colors[i];
            m.style.display = 'block';
            document.getElementById('game-board').appendChild(m);
        }
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('roll-btn').disabled = false;
        updateUI();
    }

    function updateUI() {
        const sb = document.getElementById('scoreboard');
        sb.innerHTML = players.map((p, i) => `
            <div class="player-info ${turn === i ? 'active-player' : ''}">
                <span style="color:${p.color}">●</span> P${p.id}: $${p.money}
            </div>
        `).join('');

        players.forEach((p, i) => {
            const tile = document.getElementById(`tile-${p.pos}`);
            const mark = document.getElementById(`p-mark-${i}`);
            mark.style.top = (tile.offsetTop + 8 + (i*4)) + 'px';
            mark.style.left = (tile.offsetLeft + 8 + (i*4)) + 'px';
        });
        document.getElementById('roll-btn').innerText = `玩家 ${turn+1} 投球`;
    }

    async function movePlayer() {
        if(isMoving) return;
        isMoving = true;
        document.getElementById('roll-btn').disabled = true;

        const steps = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-result').innerText = `⚾ ${steps} 點`;

        const p = players[turn];
        for(let i=0; i<steps; i++) {
            p.pos = (p.pos + 1) % TILES.length;
            updateUI();
            await new Promise(r => setTimeout(r, 400));
        }

        isMoving = false;
        showEvent(p);
    }

    function showEvent(p) {
        const tile = TILES[p.pos];
        const m = document.getElementById('modal');
        document.getElementById('overlay').style.display = 'block';
        m.style.display = 'block';
        document.getElementById('m-title').innerText = tile.name;
        const content = document.getElementById('m-content');
        const qBox = document.getElementById('m-quiz');
        qBox.innerHTML = '';
        document.getElementById('m-close').style.display = 'none';

        if(tile.type === 'stadium') {
            content.innerText = `${tile.team}主場：${tile.q}`;
            tile.opt.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.innerText = o;
                b.onclick = () => {
                    if(i === tile.ans) { alert("正確！獲得 200"); p.money += 200; }
                    else { alert("答錯了！"); }
                    nextTurn();
                };
                qBox.appendChild(b);
            });
        } else {
            content.innerText = "遇到了突發事件！";
            document.getElementById('m-close').style.display = 'block';
            p.money += 100;
        }
    }

    function nextTurn() {
        closeModal();
        turn = (turn + 1) % numPlayers;
        document.getElementById('roll-btn').disabled = false;
        document.getElementById('dice-result').innerText = '';
        updateUI();
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        if(document.getElementById('m-quiz').innerHTML === '') nextTurn();
    }

    window.onload = initMap;
</script>
</body>
</html>
